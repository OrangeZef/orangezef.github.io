name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-html:
    name: HTML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install htmlhint
        run: npm install -g htmlhint

      - name: Lint index.html
        run: htmlhint index.html

  check-links:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --max-retries 3
            --accept 429,403
            --exclude 'https://fonts\.gstatic\.com'
            './index.html'
            './sitemap.xml'
          fail: true
